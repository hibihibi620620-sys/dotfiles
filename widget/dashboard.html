<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@200;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: #191919;
      color: #e0e0e0;
      font-family: 'Roboto Mono', monospace;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 16px;
    }

    /* ── 左右2カラム ── */
    .layout {
      width: 100%;
      max-width: 640px;
      display: flex;
      align-items: center;
      gap: 16px;
      height: 180px;
    }

    /* ── 左：時計＋日付 ── */
    .left {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      gap: 6px;
      padding-right: 16px;
      border-right: 1px solid #2a2a2a;
      height: 100%;
    }

    .clock {
      font-size: 52px;
      font-weight: 200;
      letter-spacing: 0.04em;
      color: #f5f5f5;
      line-height: 1;
      white-space: nowrap;
    }

    .clock .seconds {
      font-size: 0.5em;
      color: #666;
      vertical-align: super;
      margin-left: 3px;
    }

    .date {
      font-size: 11px;
      font-weight: 400;
      color: #555;
      letter-spacing: 0.1em;
      white-space: nowrap;
    }

    .location {
      font-size: 9px;
      color: #3a3a3a;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* ── 右：天気4日分（縦並び） ── */
    .right {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
      height: 100%;
      justify-content: center;
    }

    .weather-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 8px;
      border-radius: 2px;
      background: transparent;
    }

    .weather-row:first-child {
      background: #222;
    }

    .w-day {
      font-size: 9px;
      color: #555;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      width: 30px;
      flex-shrink: 0;
    }

    .weather-row:first-child .w-day {
      color: #888;
    }

    .w-icon {
      font-size: 16px;
      line-height: 1;
      flex-shrink: 0;
      width: 22px;
      text-align: center;
    }

    .w-desc {
      font-size: 9px;
      color: #444;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .w-temps {
      display: flex;
      align-items: baseline;
      gap: 5px;
      flex-shrink: 0;
    }

    .w-high {
      font-size: 12px;
      font-weight: 500;
      color: #bbb;
    }

    .w-low {
      font-size: 10px;
      color: #444;
    }

    .loading {
      font-size: 10px;
      color: #3a3a3a;
      letter-spacing: 0.1em;
      padding: 8px 0;
    }
  </style>
</head>
<body>
  <div class="layout">

    <div class="left">
      <div class="clock">
        <span id="hm">--:--</span><span class="seconds" id="sec">--</span>
      </div>
      <div class="date" id="date">...</div>
      <div class="location">Tokyo</div>
    </div>

    <div class="right" id="weather-list">
      <div class="loading">loading...</div>
    </div>

  </div>

  <script>
    const DAYS    = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
    const DAYS_JA = ['日','月','火','水','木','金','土'];

    function pad(n) { return String(n).padStart(2, '0'); }

    function updateClock() {
      const now = new Date();
      document.getElementById('hm').textContent =
        `${pad(now.getHours())}:${pad(now.getMinutes())}`;
      document.getElementById('sec').textContent = pad(now.getSeconds());
      document.getElementById('date').textContent =
        `${now.getFullYear()}.${pad(now.getMonth()+1)}.${pad(now.getDate())}` +
        `  ${DAYS_JA[now.getDay()]}`;
    }
    updateClock();
    setInterval(updateClock, 1000);

    const WMO = {
      0:  { icon: '☀️',  desc: '快晴'        },
      1:  { icon: '🌤️', desc: 'ほぼ晴れ'    },
      2:  { icon: '⛅',  desc: '一部曇り'    },
      3:  { icon: '☁️',  desc: '曇り'        },
      45: { icon: '🌫️', desc: '霧'          },
      48: { icon: '🌫️', desc: '霧氷'        },
      51: { icon: '🌦️', desc: '霧雨（弱）'  },
      53: { icon: '🌦️', desc: '霧雨'        },
      55: { icon: '🌧️', desc: '霧雨（強）'  },
      61: { icon: '🌧️', desc: '雨（弱）'    },
      63: { icon: '🌧️', desc: '雨'          },
      65: { icon: '🌧️', desc: '大雨'        },
      71: { icon: '🌨️', desc: '雪（弱）'    },
      73: { icon: '🌨️', desc: '雪'          },
      75: { icon: '❄️',  desc: '大雪'        },
      77: { icon: '🌨️', desc: 'みぞれ'      },
      80: { icon: '🌦️', desc: 'にわか雨（弱）'},
      81: { icon: '🌦️', desc: 'にわか雨'    },
      82: { icon: '⛈️',  desc: '激しいにわか雨'},
      85: { icon: '🌨️', desc: 'にわか雪'    },
      86: { icon: '❄️',  desc: '大雪（強）'  },
      95: { icon: '⛈️',  desc: '雷雨'        },
      96: { icon: '⛈️',  desc: '雷雨＋雹'    },
      99: { icon: '⛈️',  desc: '激しい雷雨'  },
    };

    function getInfo(code) {
      return WMO[code] || { icon: '🌡️', desc: `code:${code}` };
    }

    function dayLabel(dateStr, i) {
      if (i === 0) return 'TODAY';
      if (i === 1) return 'TMR';
      return DAYS[new Date(dateStr).getDay()];
    }

    async function fetchWeather() {
      const url = 'https://api.open-meteo.com/v1/forecast'
        + '?latitude=35.6762&longitude=139.6503'
        + '&daily=weathercode,temperature_2m_max,temperature_2m_min'
        + '&timezone=Asia%2FTokyo&forecast_days=4';
      try {
        const res  = await fetch(url);
        const data = await res.json();
        const { daily } = data;
        const list = document.getElementById('weather-list');
        list.innerHTML = '';
        for (let i = 0; i < 4; i++) {
          const info  = getInfo(daily.weathercode[i]);
          const high  = Math.round(daily.temperature_2m_max[i]);
          const low   = Math.round(daily.temperature_2m_min[i]);
          const label = dayLabel(daily.time[i], i);
          const row   = document.createElement('div');
          row.className = 'weather-row';
          row.innerHTML =
            `<div class="w-day">${label}</div>` +
            `<div class="w-icon">${info.icon}</div>` +
            `<div class="w-desc">${info.desc}</div>` +
            `<div class="w-temps">` +
              `<span class="w-high">${high}°</span>` +
              `<span class="w-low">${low}°</span>` +
            `</div>`;
          list.appendChild(row);
        }
      } catch {
        document.getElementById('weather-list').innerHTML =
          '<div class="loading">取得失敗</div>';
      }
    }
    fetchWeather();
    setInterval(fetchWeather, 30 * 60 * 1000);
  </script>
</body>
</html>
